<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Por</title>
  <style>
    :root {
      --bg-a: #fff7ed;
      --bg-b: #ffe4e6;
      --bg-c: #fde7f3;
      --ink: #452c2c;
      --soft: #7a5d5d;
      --rose: #ec4899;
      --peach: #fb923c;
      --envelope: #fff3e8;
      --envelope-edge: #efc8b8;
      --paper: #fffdf8;
      --shadow: rgba(91, 33, 58, 0.15);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: start center;
      padding:
        max(18px, env(safe-area-inset-top))
        max(16px, env(safe-area-inset-right))
        max(30px, env(safe-area-inset-bottom))
        max(16px, env(safe-area-inset-left));
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(251, 146, 60, 0.22), transparent 28%),
        radial-gradient(circle at bottom right, rgba(236, 72, 153, 0.18), transparent 30%),
        linear-gradient(135deg, var(--bg-a), var(--bg-b) 55%, var(--bg-c));
      overflow-x: hidden;
      overflow-y: auto;
    }

    .glow {
      position: fixed;
      inset: auto;
      width: 360px;
      height: 360px;
      border-radius: 999px;
      filter: blur(90px);
      opacity: 0.28;
      pointer-events: none;
    }

    .glow.one {
      top: -120px;
      left: -80px;
      background: #fdba74;
    }

    .glow.two {
      right: -90px;
      bottom: -120px;
      background: #f9a8d4;
    }

    .wrap {
      width: min(100%, 760px);
      text-align: center;
      padding-top: 6px;
    }

    .intro {
      margin-bottom: 12px;
    }

    .tag {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.65);
      border: 1px solid rgba(236, 72, 153, 0.14);
      color: #be185d;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .intro h1 {
      margin: 14px 0 8px;
      font-size: clamp(30px, 4vw, 46px);
      line-height: 1.08;
      font-weight: 800;
    }

    .intro p {
      margin: 0;
      color: var(--soft);
      font-size: 16px;
    }

    .scene {
      position: relative;
      height: 600px;
      display: flex;
      align-items: end;
      justify-content: center;
      perspective: 1400px;
    }

    .envelope-area {
      position: relative;
      width: min(92vw, 520px);
      height: 420px;
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .paper-stack {
      position: absolute;
      left: 50%;
      bottom: 118px;
      width: 76%;
      transform: translateX(-50%);
    }

    .paper {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 100%;
      min-height: 200px;
      padding: 22px 24px;
      border-radius: 20px 20px 14px 14px;
      background: linear-gradient(180deg, #fffefb, var(--paper));
      border: 1px solid rgba(120, 83, 83, 0.12);
      box-shadow: 0 20px 34px rgba(91, 33, 58, 0.12);
      text-align: left;
      transform: translate(-50%, 150px) scale(0.96);
      opacity: 0;
      transition: transform 0.7s ease, opacity 0.5s ease, box-shadow 0.4s ease;
    }

    .paper small {
      display: block;
      color: #be185d;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: 0.04em;
    }

    .paper p {
      margin: 0;
      font-size: 18px;
      line-height: 1.85;
      white-space: pre-line;
    }

    .paper-1 { z-index: 2; }
    .paper-2 { z-index: 3; }
    .paper-3 { z-index: 4; }
    .paper-4 { z-index: 5; }

    .envelope-back {
      position: absolute;
      inset: auto 0 0 0;
      height: 260px;
      border-radius: 26px;
      background: linear-gradient(180deg, #fff8f0, var(--envelope));
      border: 1px solid var(--envelope-edge);
      box-shadow: 0 26px 46px var(--shadow);
    }

    .seal {
      position: absolute;
      left: 50%;
      top: 62px;
      transform: translateX(-50%);
      width: 74px;
      height: 74px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 35% 30%, #f9a8d4, #ec4899 70%);
      color: white;
      font-size: 26px;
      box-shadow: 0 12px 25px rgba(236, 72, 153, 0.28);
      z-index: 7;
      transition: transform 0.45s ease, opacity 0.35s ease;
    }

    .seal span {
      transform: rotate(-8deg);
    }

    .flap {
      position: absolute;
      left: 50%;
      top: 32px;
      width: 0;
      height: 0;
      transform: translateX(-50%) rotateX(0deg);
      transform-origin: top center;
      border-left: 260px solid transparent;
      border-right: 260px solid transparent;
      border-bottom: 170px solid #ffe6d6;
      filter: drop-shadow(0 10px 12px rgba(91, 33, 58, 0.08));
      z-index: 6;
      transition: transform 0.8s ease;
      backface-visibility: hidden;
    }

    .front {
      position: absolute;
      inset: auto 0 0 0;
      height: 240px;
      overflow: hidden;
      z-index: 8;
      border-radius: 0 0 26px 26px;
    }

    .front::before,
    .front::after {
      content: "";
      position: absolute;
      bottom: 0;
      width: 50%;
      height: 100%;
      background: linear-gradient(180deg, #ffeede, #ffe1cc);
      border: 1px solid var(--envelope-edge);
    }

    .front::before {
      left: 0;
      clip-path: polygon(0 100%, 0 0, 100% 100%);
      border-right: 0;
      border-top: 0;
    }

    .front::after {
      right: 0;
      clip-path: polygon(100% 100%, 0 100%, 100% 0);
      border-left: 0;
      border-top: 0;
    }

    .front-center {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 100%;
      height: 86%;
      background: linear-gradient(180deg, #fff1e4, #ffe7d4);
      clip-path: polygon(50% 44%, 100% 100%, 0 100%);
      border-left: 1px solid var(--envelope-edge);
      border-right: 1px solid var(--envelope-edge);
      border-bottom: 1px solid var(--envelope-edge);
    }

    .to {
      position: absolute;
      left: 50%;
      bottom: 62px;
      transform: translateX(-50%);
      z-index: 9;
      text-align: center;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .to .label {
      font-size: 14px;
      color: #9a3412;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .to .name {
      font-size: 38px;
      font-weight: 800;
      margin-top: 6px;
      color: #7c2d12;
    }

    .floor {
      position: absolute;
      left: 50%;
      bottom: 4px;
      transform: translateX(-50%);
      width: min(560px, 100%);
      height: 34px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(91, 33, 58, 0.16), transparent 70%);
      filter: blur(12px);
      z-index: 0;
    }

    .flower-burst {
      position: absolute;
      left: 50%;
      bottom: 210px;
      width: 180px;
      height: 180px;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 13;
    }

    .flower {
      position: absolute;
      opacity: 0;
      left: 50%;
      bottom: 0;
      font-size: 132px;
      filter: drop-shadow(0 16px 24px rgba(236, 72, 153, 0.24));
      transform: translate(-50%, 20px) scale(0.7) rotate(0deg);
    }

    .flower--hero {
      left: 50%;
      bottom: 0;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 14px 22px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .next-btn {
      color: #fff;
      background: linear-gradient(135deg, var(--rose), var(--peach));
      box-shadow: 0 16px 28px rgba(236, 72, 153, 0.26);
    }

    .reset-btn {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(124, 92, 92, 0.16);
    }

    .hint {
      margin-top: 14px;
      color: var(--soft);
      font-size: 14px;
    }

    .click-note {
      margin-top: 8px;
      color: #9f1239;
      font-size: 14px;
      font-weight: 600;
    }

    .scene.stage-1 .flap,
    .scene.stage-2 .flap,
    .scene.stage-3 .flap,
    .scene.stage-4 .flap,
    .scene.stage-5 .flap {
      transform: translateX(-50%) rotateX(178deg);
    }

    .scene.stage-1 .seal,
    .scene.stage-2 .seal,
    .scene.stage-3 .seal,
    .scene.stage-4 .seal,
    .scene.stage-5 .seal {
      opacity: 0;
      transform: translateX(-50%) scale(0.8);
    }

    .scene.stage-2 .paper-1 {
      opacity: 1;
      z-index: 12;
      box-shadow: 0 28px 44px rgba(91, 33, 58, 0.16);
      transform: translate(-50%, -172px) rotate(-2deg);
    }

    .scene.stage-3 .paper-1,
    .scene.stage-4 .paper-1 {
      opacity: 0.45;
      z-index: 10;
      transform: translate(-62%, -98px) scale(0.94) rotate(-7deg);
    }

    .scene.stage-3 .paper-2,
    .scene.stage-4 .paper-2 {
      opacity: 1;
      z-index: 12;
      box-shadow: 0 28px 44px rgba(91, 33, 58, 0.16);
      transform: translate(-50%, -170px) rotate(1.5deg);
    }

    .scene.stage-4 .paper-3 {
      opacity: 1;
      z-index: 12;
      box-shadow: 0 28px 44px rgba(91, 33, 58, 0.16);
      transform: translate(-50%, -170px) rotate(-1deg);
    }

    .scene.stage-5 .paper-2 {
      opacity: 0.45;
      z-index: 10;
      transform: translate(-38%, -104px) scale(0.94) rotate(6deg);
    }

    .scene.stage-5 .paper-3 {
      opacity: 0.45;
      z-index: 10;
      transform: translate(-50%, -118px) scale(0.95) rotate(-1deg);
    }

    .scene.stage-5 .paper-4 {
      opacity: 1;
      z-index: 12;
      box-shadow: 0 28px 44px rgba(91, 33, 58, 0.16);
      transform: translate(-50%, -172px) rotate(2deg);
    }

    .scene.stage-1 .to,
    .scene.stage-2 .to,
    .scene.stage-3 .to,
    .scene.stage-4 .to,
    .scene.stage-5 .to {
      opacity: 0;
      transform: translateX(-50%) translateY(10px);
    }

    .scene.stage-4 .flower {
      animation: bloomUp 0.95s ease forwards;
    }

    @keyframes bloomUp {
      0% {
        opacity: 0;
        transform: translate(-50%, 28px) scale(0.55) rotate(-10deg);
      }

      60% {
        opacity: 1;
        transform: translate(-50%, -8px) scale(1.08) rotate(6deg);
      }

      100% {
        opacity: 1;
        transform: translate(-50%, 0) scale(1) rotate(0deg);
      }
    }

    @media (max-width: 640px) {
      body {
        place-items: center;
      }

      .wrap {
        width: 100%;
      }

      .scene {
        height: 530px;
      }

      .envelope-area {
        width: min(100%, 390px);
        height: 330px;
      }

      .paper-stack {
        bottom: 104px;
        width: 84%;
      }

      .flower-burst {
        bottom: 174px;
        width: 146px;
        height: 146px;
      }

      .flower {
        font-size: 108px;
      }

      .flap {
        border-left-width: 190px;
        border-right-width: 190px;
        border-bottom-width: 140px;
      }

      .paper {
        width: 92%;
        min-height: 188px;
        padding: 18px 18px 16px;
      }

      .paper p {
        font-size: 16px;
        line-height: 1.7;
      }

      .to .name {
        font-size: 30px;
      }

      .controls {
        gap: 10px;
      }

      button {
        min-width: 150px;
        padding: 13px 18px;
        font-size: 15px;
      }

      .click-note,
      .hint {
        padding: 0 10px;
      }

      .scene.stage-2 .paper-1,
      .scene.stage-3 .paper-2,
      .scene.stage-4 .paper-2,
      .scene.stage-4 .paper-3,
      .scene.stage-5 .paper-4 {
        transform: translate(-50%, -150px) rotate(-1deg);
      }

      .scene.stage-3 .paper-1,
      .scene.stage-4 .paper-1 {
        transform: translate(-60%, -90px) scale(0.92) rotate(-6deg);
      }

      .scene.stage-5 .paper-3 {
        transform: translate(-50%, -104px) scale(0.93) rotate(-1deg);
      }
    }

    @media (max-width: 420px) {
      .tag {
        font-size: 12px;
        padding: 7px 14px;
      }

      .scene {
        height: 500px;
      }

      .envelope-area {
        width: min(100%, 360px);
        height: 308px;
      }

      .flap {
        top: 22px;
        border-left-width: 176px;
        border-right-width: 176px;
        border-bottom-width: 130px;
      }

      .envelope-back {
        height: 226px;
      }

      .front {
        height: 208px;
      }

      .paper-stack {
        bottom: 92px;
        width: 88%;
      }

      .flower-burst {
        bottom: 164px;
        width: 126px;
        height: 126px;
      }

      .flower {
        font-size: 92px;
      }

      .paper {
        min-height: 176px;
        padding: 16px 16px 14px;
      }

      .paper small {
        margin-bottom: 8px;
      }

      .paper p {
        font-size: 15px;
        line-height: 1.62;
      }

      .to {
        bottom: 54px;
      }

      .to .label {
        font-size: 12px;
      }

      .to .name {
        font-size: 26px;
      }

      .scene.stage-2 .paper-1,
      .scene.stage-3 .paper-2,
      .scene.stage-4 .paper-2,
      .scene.stage-4 .paper-3,
      .scene.stage-5 .paper-4 {
        transform: translate(-50%, -138px) rotate(-1deg);
      }

      .scene.stage-3 .paper-1,
      .scene.stage-4 .paper-1 {
        transform: translate(-60%, -84px) scale(0.91) rotate(-6deg);
      }

      .scene.stage-5 .paper-3 {
        transform: translate(-50%, -98px) scale(0.92) rotate(-1deg);
      }

      button {
        min-width: 142px;
      }

      .click-note,
      .hint {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="glow one"></div>
  <div class="glow two"></div>

  <main class="wrap">
    <div class="intro">
      <div class="tag">ถึงน้องปอ</div>
    </div>

    <section class="scene stage-0" id="scene">
      <div class="envelope-area" id="envelopeArea" title="กดที่ซองเพื่อเปิด">
        <div class="paper-stack">
          <article class="paper paper-1">
            <small>ฉบับที่ 1</small>
            <p>วันนี้คงหนักกับปอมากเลย
โดนพูดแบบนั้นใครก็เสียใจได้ มันไม่แปลว่าปอไม่เก่งนะ พี่อยู่ข้าง ๆ เสมอ</p>
          </article>

          <article class="paper paper-2">
            <small>ฉบับที่ 2</small>
            <p>วันนี้ปอเก่งมากกก
พี่มีอะไรมาให้</p>
          </article>
        </div>

        <div class="envelope-back"></div>
        <div class="flap"></div>
        <div class="seal"><span>❤</span></div>

        <div class="front">
          <div class="front-center"></div>
        </div>

        <div class="to">
          <div class="label">To</div>
          <div class="name">ปอ</div>
        </div>

        <div class="flower-burst" aria-hidden="true">
          <span class="flower flower--hero">💐</span>
        </div>

        <div class="floor"></div>
      </div>
    </section>

    <div class="controls">
      <button class="next-btn" id="nextBtn">แตะเปิดซอง</button>
      <button class="reset-btn" id="resetBtn">ปิดซองใหม่</button>
    </div>

    <div class="click-note">กดที่ซองหรือกดปุ่มก็ได้</div>
    <div class="hint" id="hint">กดช้า ๆ ได้เลย เดี๋ยวข้อความจะค่อย ๆ ออกมาทีละใบ</div>
  </main>

  <script>
    const scene = document.getElementById("scene");
    const envelopeArea = document.getElementById("envelopeArea");
    const nextBtn = document.getElementById("nextBtn");
    const resetBtn = document.getElementById("resetBtn");
    const hint = document.getElementById("hint");

    const buttonLabels = [
      "แตะเปิดซอง",
      "เปิดอีกนิด",
      "ดึงจดหมายใบแรก",
      "เปิดของที่ให้",
      "อ่านใหม่อีกรอบ"
    ];

    const hintLabels = [
      "กดช้า ๆ ได้เลย เดี๋ยวข้อความจะค่อย ๆ ออกมาทีละใบ",
      "ซองเปิดแล้ว วันนี้มีแค่สองฉบับนะ",
      "ฉบับแรกเขียนไว้ปลอบปอ",
      "ฉบับสองมาก่อน แล้วคลิกสุดท้ายค่อยรับดอกไม้",
      "ดอกไม้นี้ให้ปอคนเก่ง"
    ];

    let stage = 0;

    function advanceStage() {
      stage = stage === 4 ? 0 : stage + 1;
      renderStage();
    }

    function renderStage() {
      scene.className = "scene stage-" + stage;
      nextBtn.textContent = buttonLabels[stage];
      hint.textContent = hintLabels[stage];
    }

    envelopeArea.addEventListener("click", advanceStage);
    nextBtn.addEventListener("click", advanceStage);

    resetBtn.addEventListener("click", () => {
      stage = 0;
      renderStage();
    });

    renderStage();
  </script>
</body>
</html>
